<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h2>Chào mừng, {{ username }}!</h2>
    <h3>Danh sách người dùng (ẩn mật khẩu)</h3>
    <ul>
        {% for user in users %}
            <li>{{ user }}</li>
        {% endfor %}
    </ul>
    <p><a href="{{ url_for('logout') }}">Đăng xuất</a></p>
</body>
</html>
